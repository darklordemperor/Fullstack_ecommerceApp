services:
  mongo:
    image: mongo:7
    container_name: ecommerce_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: ecommerce_backend
    ports:
      - "8080:8080"
    env_file: ./backend/.env
    # Wait for Mongo to be accepting connections before starting the API.
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Monitoring stack (opt-in): `docker compose --profile monitoring up` ---
  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce_prometheus
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce_grafana
    profiles: ["monitoring"]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  mongo_data:
